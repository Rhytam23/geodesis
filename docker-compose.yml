version: '3.8'

services:
  mekong-smart-land:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Add a simple reverse proxy or future backend here
  # api:
  #   build: ./backend
  #   ports:
  #     - "3001:3001"
