<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ── -->
    <title>Geodesis | Geospatial Digital Twin for Climate-Resilient Agriculture</title>
    <meta
      name="description"
      content="Geodesis is a map-first AI-powered geospatial digital twin platform for the Vietnamese Mekong Delta. Satellite intelligence, transparent reasoning, and instant understanding for farmers, cooperatives, government, and researchers."
    />
    <meta name="keywords" content="Mekong Delta, precision agriculture, GIS, digital twin, climate resilience, Vietnam, crop recommendation, salinity, AI" />
    <meta name="author" content="Geodesis Team" />

    <!-- ── Open Graph (social sharing) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Geodesis — Climate-Resilient Agriculture for the Mekong Delta" />
    <meta property="og:description" content="AI-powered geospatial digital twin: satellite intelligence, explainable crop recommendations, and economic modelling for Vietnamese agriculture." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Geodesis — Climate-Resilient Agriculture" />
    <meta name="twitter:description" content="AI-powered geospatial digital twin for the Mekong Delta." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── Fonts (performance: preconnect first, then stylesheet) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ── Theme colour (browser chrome) ── -->
    <meta name="theme-color" content="#14532D" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
